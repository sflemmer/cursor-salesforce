function FlowStep({ step }) {

function PersonaFlow({ steps }) {
  const row1 = steps.slice(0, 3);
  const row2 = steps.slice(3);
  return (
    <div>
      <div className="flow-row" style={{display: 'flex', alignItems: 'stretch', gap: '6px', marginBottom: '4px'}}>
        {row1.map((step, i) => (
          <React.Fragment key={step.n}>
            <FlowStep step={step} />
            {i < row1.length - 1 && (
              <div className="flow-arrow">→</div>
            )}
          </React.Fragment>
        ))}
      </div>
      {row2.length > 0 && (
        <>
          <div className="flow-connector">↓</div>
          <div className="flow-row" style={{display: 'flex', alignItems: 'stretch', gap: '6px'}}>
            {row2.map((step, i) => (
              <React.Fragment key={step.n}>
                <FlowStep step={step} />
                {i < row2.length - 1 && (
                  <div className="flow-arrow">→</div>

            ))}
          </div>
        </>
      )}
    </div>
  );
}
